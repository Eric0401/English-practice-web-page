        async function init() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('learning-card').classList.add('hidden');
            document.getElementById('quiz-space').classList.add('hidden');
            
            dailyList = [];
            let triedWords = new Set();
            
            while (dailyList.length < 10) {
                let randomIndex = Math.floor(Math.random() * corePool.length);
                let word = corePool[randomIndex];
                
                if (triedWords.has(word)) continue;
                triedWords.add(word);
                
                document.getElementById('loading-text').innerText = `正在載入精選單字 (${dailyList.length}/10)...`;
                
                const data = await getFullWordInfo(word);
                if (data) dailyList.push(data);
            }

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('learning-card').classList.remove('hidden');
            currentIndex = 0;
            render();
        }

        async function getFullWordInfo(word) {
            try {
                const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if (!dictRes.ok) return null;
                const dictData = await dictRes.json();
                const transRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${word}`);
                const transData = await transRes.json();

                return {
                    word: word,
                    phonetic: dictData[0].phonetic || (dictData[0].phonetics.find(p => p.text)?.text) || "/ - /",
                    pos: dictData[0].meanings[0].partOfSpeech,
                    definition: dictData[0].meanings[0].definitions[0].definition,
                    translation: transData[0][0][0],
                    audio: dictData[0].phonetics.find(p => p.audio !== "")?.audio || null
                };
            } catch (e) { return null; }
        }

        function render() {
            const data = dailyList[currentIndex];
            document.getElementById('word-display').innerText = data.word;
            document.getElementById('phonetic').innerText = data.phonetic;
            document.getElementById('pos').innerText = `${data.pos}.`;
            document.getElementById('translation').innerText = data.translation;
            document.getElementById('en-definition').innerText = data.definition;
            document.getElementById('progress-text').innerText = `Word ${currentIndex + 1} / 10`;
            setTimeout(playAudio, 300);
        }

        function enterQuizMode() {
            document.getElementById('learning-card').classList.add('hidden');
            document.getElementById('quiz-space').classList.remove('hidden');
            const quizList = document.getElementById('quiz-list');
            quizList.innerHTML = '';
            
            dailyList.forEach((item, index) => {
                quizList.innerHTML += `
                    <div class="p-5 bg-white rounded-[1.5rem] border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold text-slate-300">#${index + 1}</span>
                            <span class="text-xl font-black text-slate-800">${item.translation}</span>
                        </div>
                        <input type="text" data-ans="${item.word}" autocomplete="off" spellcheck="false" class="quiz-input w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-400 focus:bg-white outline-none font-bold text-center text-xl transition-all" placeholder="請填寫英文...">
                        <p class="result-msg text-xs mt-2 font-bold hidden text-center uppercase tracking-tighter"></p>
                    </div>
                `;
            });
        }

        function checkAllAnswers() {
            const inputs = document.querySelectorAll('.quiz-input');
            const messages = document.querySelectorAll('.result-msg');
            let score = 0;

            inputs.forEach((input, i) => {
                const userAns = input.value.trim().toLowerCase();
                const correctAns = input.getAttribute('data-ans').toLowerCase();
                messages[i].classList.remove('hidden');

                if (userAns === correctAns) {
                    input.className = "quiz-input w-full p-4 bg-green-50 rounded-2xl border-2 border-green-500 outline-none font-bold text-center text-xl text-green-700";
                    messages[i].innerText = "✅ 正確";
                    messages[i].className = "result-msg text-xs mt-2 font-bold text-green-500";
                    score++;
                } else {
                    input.className = "quiz-input w-full p-4 bg-red-50 rounded-2xl border-2 border-red-500 outline-none font-bold text-center text-xl text-red-700";
                    messages[i].innerText = `正解：${correctAns}`;
                    messages[i].className = "result-msg text-xs mt-2 font-bold text-red-500";
                }
            });
            alert(`挑戰結束！你答對了 ${score} / 10。`);
        }

        function exitQuizMode() {
            document.getElementById('quiz-space').classList.add('hidden');
            document.getElementById('learning-card').classList.remove('hidden');
        }

        function playAudio() {
            const data = dailyList[currentIndex];
            if (data.audio) new Audio(data.audio).play();
            else {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(data.word);
                msg.lang = 'en-US';
                window.speechSynthesis.speak(msg);
            }
        }

        function nextWord() { currentIndex = (currentIndex + 1) % dailyList.length; render(); }
        function prevWord() { currentIndex = (currentIndex - 1 + dailyList.length) % dailyList.length; render(); }
        function refreshNewSet() { if(confirm("確定要更換一組 10 個核心單字嗎？")) init(); }

        init();
